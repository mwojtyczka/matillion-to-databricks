# Databricks Asset Bundle converted from the Matillion project in ../matillion/
#
# Mapping:
#   create-maia-demo-data.orch.yaml (orchestration pipeline) -> a Databricks Job
#   sales-by-category-region.tran.yaml (transformation pipeline) -> a Job SQL task
#     (pure full-refresh SQL, single output, no Lakeflow features -> no pipeline needed)
#
# Every task runs on the Job's task graph: SQL tasks for the setup + transform,
# a notebook task for the python-script aggregation. No Lakeflow pipeline resource.
#
# Deploy with:  databricks bundle deploy -t dev
# Run with:     databricks bundle run maia_demo_job -t dev
bundle:
  name: matillion-maia-demo

variables:
  catalog:
    description: Target Unity Catalog catalog (resolves Matillion [Environment Default])
    default: main
  schema:
    description: Target schema
    default: matillion_demo
  warehouse_id:
    description: SQL warehouse ID for the sql-executor (setup) tasks
    default: ""  # set to your SQL warehouse ID, e.g. via `-t dev --var warehouse_id=<id>`

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://your-workspace.cloud.databricks.com
