# Databricks Job built from matillion-migration-demo.orch.yaml
#
# The orchestration's transitions become task dependencies (depends_on). The
# `start` and `end-success` components carry no task — they are just graph
# boundaries. Matillion transition graph:
#
#   Start -> Dimension Tables -> Generate Fact Data -> Run Transformation
#         -> Create Aggregation Table -> End Success
resources:
  jobs:
    matillion_migration_demo_job:
      name: matillion-migration-demo-job
      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
      tasks:
        # sql-executor "Dimension Tables" -> SQL task (seed/DDL).
        # catalog/schema are passed as SQL task parameters (bound to :catalog / :schema
        # in the .sql via USE ... IDENTIFIER()), so the namespace is never hardcoded.
        - task_key: dimension_tables
          sql_task:
            warehouse_id: ${var.warehouse_id}
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
            file:
              path: ../src/setup/01_dimension_tables.sql

        # sql-executor "Generate Fact Data" -> SQL task, depends on dimension_tables
        - task_key: generate_fact_data
          depends_on:
            - task_key: dimension_tables
          sql_task:
            warehouse_id: ${var.warehouse_id}
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
            file:
              path: ../src/setup/02_generate_fact_data.sql

        # run-transformation "Run Transformation" -> SQL task.
        # The transformation is pure full-refresh SQL with a single output and no
        # Lakeflow features (streaming/expectations/reuse), so it runs as a SQL task
        # rather than a Lakeflow pipeline. See the skill's transformation references.
        - task_key: run_transformation
          depends_on:
            - task_key: generate_fact_data
          sql_task:
            warehouse_id: ${var.warehouse_id}
            parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
            file:
              path: ../src/setup/03_sales_by_category_region.sql

        # python-script "Create Aggregation Table" -> notebook task, depends on run_transformation
        - task_key: create_aggregation_table
          depends_on:
            - task_key: run_transformation
          notebook_task:
            notebook_path: ../src/notebooks/create_aggregation_table.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
