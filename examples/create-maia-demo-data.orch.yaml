        script1: |
          import subprocess
          import json

          # SQL to create an aggregation table: revenue by product category
          sql = """
          CREATE OR REPLACE TABLE marcin_demo.default.maia_sample_category_summary AS
          SELECT
            p.category,
            COUNT(s.sale_id) AS total_sales,
            SUM(s.quantity) AS total_quantity,
            SUM(s.revenue) AS total_revenue,
            AVG(s.revenue) AS avg_revenue,
            MIN(s.revenue) AS min_revenue,
            MAX(s.revenue) AS max_revenue
          FROM marcin_demo.default.maia_sample_sales s
          JOIN marcin_demo.default.maia_sample_products p
            ON s.product_id = p.product_id
          GROUP BY p.category
          ORDER BY total_revenue DESC
          """

          # Execute via Matillion context
          cursor = context.cursor()
          cursor.execute(sql)
          print("Successfully created maia_sample_category_summary table")
